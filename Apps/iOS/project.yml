name: Pika
options:
  bundleIdPrefix: com.pikapika
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    # `complete` + SwiftData/SwiftUI often produces noisy or blocking diagnostics in Xcode; `minimal` keeps apps buildable while packages opt in separately.
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  PikaCore:         { path: ../../Packages/PikaCore }
  PikaAI:           { path: ../../Packages/PikaAI }
  PetEngine:        { path: ../../Packages/PetEngine }
  PikaSync:         { path: ../../Packages/PikaSync }
  PikaSubscription: { path: ../../Packages/PikaSubscription }
  SharedUI:         { path: ../../Packages/SharedUI }
targets:
  Pika:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../Shared/Sources
    resources:
      - Resources
    dependencies:
      - package: PikaCore
      - package: PikaAI
      - package: PetEngine
      - package: PikaSync
      - package: PikaSubscription
      - package: SharedUI
    info:
      path: Resources/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSFaceIDUsageDescription: "Unlock reveals your saved API keys."
        NSUserNotificationsUsageDescription: "Your pet sends gentle nudges when you've been away."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pikapika.app
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ENABLE_PREVIEWS: "YES"
  PikaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Pika
      - package: SharedUI
      - package: PikaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pikapika.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pika.app/Pika"
        BUNDLE_LOADER: "$(TEST_HOST)"
