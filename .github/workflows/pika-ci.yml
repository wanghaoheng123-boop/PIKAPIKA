name: Pika CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # No SwiftData macros — stable on hosted runners.
  pika-core-base-swift-test:
    name: PikaCoreBase swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -eo pipefail
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
          swift --version

      - name: Swift test (PikaCoreBase)
        working-directory: Packages/PikaCoreBase
        run: swift test -v

  pikaai-swift-test:
    name: PikaAI swift test
    # Needs a newer default Xcode / Swift than macos-14 for URLSession async bytes + concurrency.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -eo pipefail
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
          swift --version
          xcodebuild -version

      - name: Swift build (PikaAI)
        id: pikaai_build
        continue-on-error: true
        working-directory: Packages/PikaAI
        run: swift build -v 2>&1 | tee /tmp/pika-ai-build.log

      - name: Swift build log (on failure)
        if: steps.pikaai_build.outcome == 'failure'
        run: tail -n 200 /tmp/pika-ai-build.log

      - name: Upload PikaAI build log artifact
        if: steps.pikaai_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pika-ai-swift-build-log
          path: /tmp/pika-ai-build.log
          if-no-files-found: ignore

      - name: Swift build must succeed
        if: steps.pikaai_build.outcome != 'success'
        run: exit 1

      - name: Swift test (PikaAI)
        id: pikaai_test
        continue-on-error: true
        working-directory: Packages/PikaAI
        run: swift test -v 2>&1 | tee /tmp/pika-ai-test.log

      - name: Swift test log (on failure)
        if: steps.pikaai_test.outcome == 'failure'
        run: tail -n 200 /tmp/pika-ai-test.log

      - name: Upload PikaAI test log artifact
        if: steps.pikaai_test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pika-ai-swift-test-log
          path: /tmp/pika-ai-test.log
          if-no-files-found: ignore

      - name: Swift test must succeed
        if: steps.pikaai_test.outcome != 'success'
        run: exit 1
