name: Pika CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # No SwiftData macros — stable on hosted runners.
  pika-core-base-swift-test:
    name: PikaCoreBase swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -eo pipefail
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
          swift --version

      - name: Swift test (PikaCoreBase)
        working-directory: Packages/PikaCoreBase
        run: swift test -v

  pikaai-swift-test:
    name: PikaAI swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -eo pipefail
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          fi
          swift --version
          xcodebuild -version

      - name: Swift build (PikaAI)
        working-directory: Packages/PikaAI
        run: |
          set -o pipefail
          if ! swift build -v 2>&1 | tee /tmp/pika-ai-build.log; then
            echo "::error::swift build failed — last 120 lines:"
            tail -n 120 /tmp/pika-ai-build.log
            exit 1
          fi

      - name: Swift test (PikaAI)
        working-directory: Packages/PikaAI
        run: swift test -v
